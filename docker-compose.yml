# Local dev: Postgres. Run: docker compose up -d
# Then: backend/.env with DATABASE_URL=postgresql+psycopg://postgres:postgres@localhost:5432/aws_ci_test
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aws_ci_test
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: {}
